services:
  hasha2a:
    build: .
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
      - HASHA2A_CACHE_DIR=/data/cache
    volumes:
      - hasha2a_data:/data/cache
    restart: unless-stopped
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n_default"
      - "traefik.http.routers.hasha2a.rule=Host(`hasha2a.com`)"
      - "traefik.http.routers.hasha2a.entrypoints=websecure"
      - "traefik.http.routers.hasha2a.tls=true"
      - "traefik.http.routers.hasha2a.tls.certresolver=mytlschallenge"
      - "traefik.http.services.hasha2a.loadbalancer.server.port=8080"

networks:
  n8n_default:
    external: true

volumes:
  hasha2a_data:
