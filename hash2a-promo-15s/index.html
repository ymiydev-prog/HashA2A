<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<title>HashA2A — Verified Intelligence for AI Agents</title>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=block" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{margin:0;width:1920px;height:1080px;overflow:hidden;background:#0a0a1a;font-family:"Inter",sans-serif;color:white}
.scene{position:absolute;top:0;left:0;width:100%;height:100%}
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0" data-duration="15" data-width="1920" data-height="1080">
  <div id="scene-1" class="scene" data-composition-id="scene-intro" data-composition-src="compositions/scene-intro.html" data-start="0" data-duration="4.5" data-track-index="1" data-width="1920" data-height="1080"></div>
  <div id="scene-2" class="scene" data-composition-id="scene-value" data-composition-src="compositions/scene-value.html" data-start="4.5" data-duration="6.5" data-track-index="1" data-width="1920" data-height="1080"></div>
  <div id="scene-3" class="scene" data-composition-id="scene-cta" data-composition-src="compositions/scene-cta.html" data-start="11" data-duration="4" data-track-index="1" data-width="1920" data-height="1080"></div>
</div>
<script>
window.__timelines=window.__timelines||{};const mainTl=gsap.timeline({paused:true});
mainTl.to("#scene-1",{opacity:0,duration:0.35,ease:"power2.in"},4.15);
mainTl.set("#scene-2",{opacity:1},4.5);
mainTl.to("#scene-2",{opacity:0,duration:0.35,ease:"power2.in"},10.65);
mainTl.set("#scene-3",{opacity:1},11.0);
window.__timelines["main"]=mainTl;
</script>
</body>
</html>
