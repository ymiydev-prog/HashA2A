<template id="scene-value-template">
  <div id="scene-value" data-composition-id="scene-value" data-width="1920" data-height="1080" data-duration="6.5">
    <div class="canvas">
      <div class="bg-gradient"></div>
      <div class="slide">
        <div class="badge">WHY HASHA2A</div>
        <div class="title">Your AI Agent Deserves<br/><span class="gradient-text">Real Verified Data</span></div>
        <div class="value-grid">
          <div class="value-card card-1">
            <div class="vc-number">01</div>
            <div class="vc-title">One Endpoint</div>
            <div class="vc-desc">No API keys. No accounts. Just call get_price() via MCP and get verified multi-oracle data.</div>
          </div>
          <div class="value-card card-2">
            <div class="vc-number">02</div>
            <div class="vc-title">Pay Per Query</div>
            <div class="vc-desc">HBAR or USDC. No subscriptions. No rate limits. You only pay for what your agent consumes.</div>
          </div>
          <div class="value-card card-3">
            <div class="vc-number">03</div>
            <div class="vc-title">Triple Verified</div>
            <div class="vc-desc">Pyth + CoinGecko + DeFiLlama. Median with IQR confidence scoring. Cross-verified, not guessed.</div>
          </div>
        </div>
      </div>
    </div>
    <style>
      #scene-value { position: absolute; inset: 0; width: 1920px; height: 1080px; overflow: hidden; }
      #scene-value .canvas{width:1920px;height:1080px;background:#0a0a1a;position:relative;overflow:hidden;font-family:'Inter',sans-serif;color:white}
      #scene-value .bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(59,130,246,0.06) 0%,transparent 50%),radial-gradient(ellipse at 70% 50%,rgba(139,92,246,0.06) 0%,transparent 50%)}
      #scene-value .slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 100px}
      #scene-value .badge{font-size:11px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:#3b82f6;border:1px solid rgba(59,130,246,0.3);border-radius:999px;padding:6px 18px;margin-bottom:12px;opacity:0;transform:translateY(10px)}
      #scene-value .title{font-size:44px;font-weight:800;text-align:center;line-height:1.25;letter-spacing:-0.02em;opacity:0;transform:translateY(20px)}
      #scene-value .gradient-text{background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
      #scene-value .value-grid{display:flex;gap:20px;margin-top:24px}
      #scene-value .value-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:18px;padding:24px 20px;width:300px;opacity:0;transform:translateY(24px)}
      #scene-value .vc-number{font-size:28px;font-weight:800;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
      #scene-value .vc-title{font-size:17px;font-weight:700;margin-bottom:6px;color:#e2e8f0}
      #scene-value .vc-desc{font-size:13px;color:#64748b;line-height:1.6;font-weight:400}
    </style>
    <script>
      (function(){const tl=gsap.timeline({paused:true});const id='#scene-value';
        tl.to(id+' .badge',{opacity:1,y:0,duration:0.35,ease:'power3.out'},0);
        tl.to(id+' .title',{opacity:1,y:0,duration:0.45,ease:'power3.out'},0.3);
        tl.to(id+' .card-1',{opacity:1,y:0,duration:0.4,ease:'power3.out'},0.7);
        tl.to(id+' .card-2',{opacity:1,y:0,duration:0.4,ease:'power3.out'},1.0);
        tl.to(id+' .card-3',{opacity:1,y:0,duration:0.4,ease:'power3.out'},1.3);
        tl.to(id+' .value-card',{y:-6,duration:2.0,ease:'sine.inOut'},2.5);
        tl.to(id+' .value-card',{y:0,duration:2.0,ease:'sine.inOut'},4.5);
        tl.to(id+' .slide',{opacity:0,y:-10,duration:0.3,ease:'power2.in'},6.15);
        window.__timelines=window.__timelines||{};window.__timelines["scene-value"]=tl;
      })();
    </script>
  </div>
</template>
