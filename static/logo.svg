<svg width="120" height="120" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="brand-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- outer glow -->
  <polygon points="30,4 52,16 52,40 30,52 8,40 8,16" fill="url(#brand-glow)"/>
  <!-- main hexagon -->
  <polygon points="30,4 52,16 52,40 30,52 8,40 8,16" fill="none" stroke="url(#brand)" stroke-width="2.5" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- inner hexagon -->
  <polygon points="30,14 44,22 44,36 30,44 16,36 16,22" fill="url(#brand)" opacity="0.12"/>
  <!-- oracle nodes -->
  <circle cx="30" cy="4" r="3.5" fill="#3b82f6"/>
  <circle cx="52" cy="16" r="3.5" fill="#6366f1"/>
  <circle cx="52" cy="40" r="3.5" fill="#8b5cf6"/>
  <circle cx="30" cy="52" r="3.5" fill="#06b6d4"/>
  <circle cx="8" cy="40" r="3.5" fill="#3b82f6"/>
  <circle cx="8" cy="16" r="3.5" fill="#6366f1"/>
  <!-- central hub -->
  <circle cx="30" cy="28" r="5" fill="white" opacity="0.9"/>
  <circle cx="30" cy="28" r="2.5" fill="#3b82f6"/>
  <!-- connections -->
  <line x1="30" y1="4" x2="30" y2="23" stroke="white" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="52" y1="16" x2="34" y2="25" stroke="white" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="52" y1="40" x2="34" y2="31" stroke="white" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="52" x2="30" y2="33" stroke="white" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="40" x2="26" y2="31" stroke="white" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="16" x2="26" y2="25" stroke="white" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
</svg>
