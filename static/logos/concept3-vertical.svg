<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 72" role="img" aria-labelledby="c3v-title c3v-desc">
  <title id="c3v-title">HashA2A Logo — Concept 3 Vertical</title>
  <desc id="c3v-desc">Orbital consensus ring with wordmark below</desc>
  <defs>
    <linearGradient id="c3v-ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="c3v-ring2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="c3v-ring3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <g id="icon">
    <circle cx="30" cy="28" r="24" fill="none" stroke="url(#c3v-ring1)" stroke-width="2" opacity="0.3"/>
    <circle cx="30" cy="28" r="16" fill="none" stroke="url(#c3v-ring2)" stroke-width="2" opacity="0.5"/>
    <circle cx="30" cy="28" r="9" fill="url(#c3v-ring3)" opacity="0.15"/>
    <circle cx="30" cy="4" r="3.5" fill="#3b82f6"/>
    <circle cx="50" cy="16" r="3" fill="#6366f1"/>
    <circle cx="46" cy="40" r="3" fill="#8b5cf6"/>
    <circle cx="14" cy="40" r="3" fill="#06b6d4"/>
    <circle cx="10" cy="16" r="3" fill="#3b82f6"/>
    <circle cx="30" cy="28" r="4.5" fill="white" opacity="0.9"/>
    <circle cx="30" cy="28" r="2" fill="#3b82f6"/>
    <path d="M30,23.5 L50,16" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <path d="M30,23.5 L46,40" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <path d="M30,23.5 L14,40" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <path d="M30,23.5 L10,16" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <path d="M30,23.5 L30,4" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  </g>
  <g id="wordmark">
    <text x="30" y="66" text-anchor="middle" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="800" letter-spacing="-0.02em">
      <tspan fill="#3b82f6">Hash</tspan><tspan fill="#8b5cf6">A2A</tspan>
    </text>
  </g>
</svg>
