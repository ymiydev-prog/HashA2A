<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" role="img" aria-labelledby="c2h-title c2h-desc">
  <title id="c2h-title">HashA2A Logo — Concept 2 Horizontal</title>
  <desc id="c2h-desc">Interlocking A2A geometric mark with wordmark</desc>
  <defs>
    <linearGradient id="c2-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="c2-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="c2-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <g id="icon">
    <rect x="4" y="4" width="52" height="52" rx="12" fill="#0a0e1a" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <g transform="translate(10, 12)">
      <path d="M16,0 L28,36 L22,36 L19,28 L13,28 L10,36 L4,36 Z" fill="url(#c2-blue)"/>
      <path d="M16,8 L14,22 L18,22 Z" fill="#0a0e1a"/>
      <path d="M36,4 L36,10 L42,10 L42,16 L36,16 L36,22 L42,22 L42,28 L36,28 L36,36 L30,36 L30,28 L24,28 L24,22 L30,22 L30,16 L24,16 L24,10 L30,10 L30,4 Z" fill="url(#c2-purple)"/>
      <path d="M48,0 L60,36 L54,36 L51,28 L45,28 L42,36 L36,36 Z" fill="url(#c2-cyan)"/>
      <path d="M48,8 L46,22 L50,22 Z" fill="#0a0e1a"/>
      <rect x="28" y="14" width="4" height="4" rx="1" fill="white" opacity="0.6"/>
    </g>
  </g>
  <g id="wordmark">
    <text x="68" y="36" font-family="'Inter', -apple-system, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.02em">
      <tspan fill="#3b82f6">Hash</tspan><tspan fill="#8b5cf6">A2A</tspan>
    </text>
  </g>
</svg>
